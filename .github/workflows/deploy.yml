name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Lint
        run: |
          flake8 .

      - name: Security Scan
        run: |
          bandit -r .

      - name: Run Tests
        run: |
          pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fastapi-cicd .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fastapi-cicd:${{ github.sha }} .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-cicd
          docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-cicd:${{ github.sha }} 

      - name: Deploy EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/fastapi-cicd
            docker stop fastapi || true
            docker rm fastapi || true
            docker run -d -p 8000:8000 --name fastapi ${{ secrets.DOCKER_USERNAME }}/fastapi-cicd