name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/fastapi-cicd .
    - name: Test
      run: echo "CI/CD pipeline is working 🚀-${{ secrets.DOCKER_USERNAME }}"
    - name: Push image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-cicd

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/fastapi-cicd
          docker stop fastapi || true
          docker rm fastapi || true
          docker run -d -p 8000:8000 --name fastapi ${{ secrets.DOCKER_USERNAME }}/fastapi-cicd
