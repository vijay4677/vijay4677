name: Deploy Staging

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v3

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/fastapi-staging .

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-staging

      - name: Deploy to staging EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ec2-user
          key: ${{ secrets.STAGING_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/fastapi-staging
            docker stop fastapi || true
            docker rm fastapi || true
            docker run -d -p 8000:8000 --name fastapi ${{ secrets.DOCKER_USERNAME }}/fastapi-staging